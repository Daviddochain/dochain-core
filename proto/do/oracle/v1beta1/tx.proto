syntax = "proto3";
package do.oracle.v1beta1;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/Daviddochain/dochain-core/v4/x/oracle/types";

// Msg defines the oracle Msg service.
service Msg {
  // AggregateDoRatePrevote defines a method for submitting
  // aggregate exchange rate prevote
  rpc AggregateDoRatePrevote(MsgAggregateDoRatePrevote) returns (MsgAggregateDoRatePrevoteResponse);

  // AggregateDoRateVote defines a method for submitting
  // aggregate exchange rate vote
  rpc AggregateDoRateVote(MsgAggregateDoRateVote) returns (MsgAggregateDoRateVoteResponse);

  // DelegateFeedConsent defines a method for setting the feeder delegation
  rpc DelegateFeedConsent(MsgDelegateFeedConsent) returns (MsgDelegateFeedConsentResponse);
}

// MsgAggregateDoRatePrevote represents a message to submit
// aggregate exchange rate prevote.
message MsgAggregateDoRatePrevote {
  option (cosmos.msg.v1.signer)      = "feeder";
  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  string hash      = 1 [(gogoproto.moretags) = "yaml:\"hash\""];
  string feeder    = 2 [(gogoproto.moretags) = "yaml:\"feeder\""];
  string validator = 3 [(gogoproto.moretags) = "yaml:\"validator\""];
}

// MsgAggregateDoRatePrevoteResponse defines the Msg/AggregateDoRatePrevote response type.
message MsgAggregateDoRatePrevoteResponse {}

// MsgAggregateDoRateVote represents a message to submit
// aggregate exchange rate vote.
message MsgAggregateDoRateVote {
  option (cosmos.msg.v1.signer)      = "feeder";
  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  string salt           = 1 [(gogoproto.moretags) = "yaml:\"salt\""];
  string exchange_rates = 2 [(gogoproto.moretags) = "yaml:\"exchange_rates\""];
  string feeder         = 3 [(gogoproto.moretags) = "yaml:\"feeder\""];
  string validator      = 4 [(gogoproto.moretags) = "yaml:\"validator\""];
}

// MsgAggregateDoRateVoteResponse defines the Msg/AggregateDoRateVote response type.
message MsgAggregateDoRateVoteResponse {}

// MsgDelegateFeedConsent represents a message to
// delegate oracle voting rights to another address.
message MsgDelegateFeedConsent {
  option (cosmos.msg.v1.signer)      = "operator";
  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  string operator = 1 [
    (gogoproto.moretags)   = "yaml:\"operator\"",
    (cosmos_proto.scalar)  = "cosmos.ValidatorAddressString"
  ];
  string delegate = 2 [(gogoproto.moretags) = "yaml:\"delegate\""];
}

// MsgDelegateFeedConsentResponse defines the Msg/DelegateFeedConsent response type.
message MsgDelegateFeedConsentResponse {}








