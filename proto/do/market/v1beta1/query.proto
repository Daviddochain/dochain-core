syntax = "proto3";
package do.market.v1beta1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

import "do/market/v1beta1/market.proto";

option go_package = "github.com/Daviddochain/dochain-core/v4/x/market/types";

// Query defines the gRPC querier service.
service Query {
  // Swap returns simulated swap amount.
  rpc Swap(QuerySwapRequest) returns (QuerySwapResponse) {
    option (google.api.http).get = "/do/market/v1beta1/swap";
  }

  // DoPoolDelta returns do_pool_delta amount.
  rpc DoPoolDelta(QueryDoPoolDeltaRequest) returns (QueryDoPoolDeltaResponse) {
    option (google.api.http).get = "/do/market/v1beta1/do_pool_delta";
  }

  // Params queries all parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/do/market/v1beta1/params";
  }
}

// QuerySwapRequest is the request type for the Query/Swap RPC method.
message QuerySwapRequest {
  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  // offer_coin defines the coin being offered (i.e. 1000000udo)
  string offer_coin = 1;
  // ask_denom defines the denom of the coin to swap to
  string ask_denom = 2;
}

// QuerySwapResponse is the response type for the Query/Swap RPC method.
message QuerySwapResponse {
  // return_coin defines the coin returned as a result of the swap simulation.
  cosmos.base.v1beta1.Coin return_coin = 1 [(gogoproto.nullable) = false];
}

// QueryDoPoolDeltaRequest is the request type for the Query/DoPoolDelta RPC method.
message QueryDoPoolDeltaRequest {}

// QueryDoPoolDeltaResponse is the response type for the Query/DoPoolDelta RPC method.
message QueryDoPoolDeltaResponse {
  // do_pool_delta defines the gap between the DoPool and the DoBasePool
  bytes do_pool_delta = 1 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
}

// QueryParamsRequest is the request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params defines the parameters of the module.
  Params params = 1 [(gogoproto.nullable) = false];
}









