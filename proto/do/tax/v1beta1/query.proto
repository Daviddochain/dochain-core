syntax = "proto3";
package do.tax.v1beta1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "do/tax/v1beta1/genesis.proto";

option go_package = "github.com/Daviddochain/dochain-core/v4/x/tax/types";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/do/tax/v1beta1/params";
  }
  rpc BurnTaxRate(QueryBurnTaxRateRequest) returns (QueryBurnTaxRateResponse) {
    option (google.api.http).get = "/do/tax/v1beta1/burn_tax_rate";
  }
}

//=============================== Params
message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryBurnTaxRateRequest {}
message QueryBurnTaxRateResponse {
  string tax_rate = 1 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec", (gogoproto.nullable) = false];
}








