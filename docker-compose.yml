version: '3.8'

services:
  dochainnode0:
    platform: linux/amd64
    container_name: dochainnode0
    image: daviddochain/dochaind-env
    restart: always
    ports:
      - "1317:1317"
      - "9090:9090"
      - "26656-26657:26656-26657"
    environment:
      - ID=0
      - LOG=dochaind.log
    volumes:
      - ./build:/dochaind:Z
    networks:
      localnet:
        ipv4_address: 192.168.10.2

